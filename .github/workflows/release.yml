name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(jq -r .version manifest.json)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match manifest.json version $VERSION"
            exit 1
          fi

      # NOTE: build-provenance attestation was removed deliberately (2026-07-17).
      # The attestations we produced verified cleanly with GitHub's own tooling
      # (`gh attestation verify` passed against the released assets, signed by
      # this repo's workflow, built from the exact tagged commit) — but the
      # Obsidian store's verifier rejected them as "invalid or does not match
      # this repository", which HARD-FAILS the listing review. Attestations are
      # only an advisory nice-to-have there, so shipping without them trades a
      # blocking failure for a harmless recommendation. Revisit if the store's
      # verifier changes.

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — refreshing assets."
            gh release upload "$TAG" main.js manifest.json styles.css --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css \
              --title "$TAG" --generate-notes
          fi
